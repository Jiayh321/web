    <style>
        /* 全局样式优化 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", "PingFang SC", Arial, sans-serif;
            scroll-behavior: smooth; /* 让滚动更平滑 */
        }
        
        body {
            background: url("image/bg.jpg") no-repeat center center fixed;
            background-size: cover;
            position: relative;
            min-height: 100vh;
            overflow-y: auto; /* 确保纵向滚动 */
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.85);
            z-index: -1;
        }

        /* 导航栏固定在顶部 */
        .nav-bar {
            background-color: #165DFF;
            padding: 1rem 0;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-list {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .nav-item button {
            background: none;
            border: none;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0.5rem 1.2rem;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .nav-item button:hover, .nav-item button.active {
            background-color: #0E42D2;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* 页面容器 */
        .page-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 1rem;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-container.active {
            display: block;
        }

        .page-title {
            text-align: center;
            color: #165DFF;
            margin-bottom: 2.5rem;
            font-size: 2rem;
        }

        /* 资源网格：自动适应列数 */
        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .resource-card {
            background-color: rgba(255, 255, 255, 0.5); /* 半透明卡片感 */
            backdrop-filter: blur(5px);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .resource-card:hover {
            transform: translateY(-8px);
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .resource-img {
            width: 100%;
            height: 150px;
            border-radius: 8px;
            margin-bottom: 1.2rem;
            object-fit: cover;
            background-color: #f0f2f5;
        }

        .action-btn {
            width: 80%;
            padding: 0.7rem;
            background-color: #165DFF;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .action-btn:hover {
            background-color: #0E42D2;
        }

        /* 页脚信息 */
        .footer-info {
            max-width: 800px;
            margin: 4rem auto 2rem auto;
            text-align: center;
        }

        .contact {
            color: #4E5969;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .notice {
            font-size: 0.9rem;
            color: #F53F3F;
            line-height: 1.6;
            padding: 1rem;
            border-top: 1px solid #eee;
        }
    </style>
</head>

    <script>
        const navBtns = document.querySelectorAll('.nav-btn');
        const pageContainers = document.querySelectorAll('.page-container');

        navBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // 1. 更新按钮状态
                navBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // 2. 切换页面显示
                const targetId = `${btn.dataset.page}-page`;
                pageContainers.forEach(page => {
                    page.classList.remove('active');
                    if(page.id === targetId) {
                        page.classList.add('active');
                    }
                });

                // 3. 核心：切换页面时自动回到顶部，方便滑动体验
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
        });
