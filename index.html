<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源导航站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", Arial, sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: url("image/bg.jpg") no-repeat center center fixed;
            background-size: cover;
            position: relative;
            min-height: 100vh;
            overflow-y: auto;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.85);
            z-index: -1;
        }

        .nav-bar {
            background-color: #165DFF;
            padding: 1rem 0;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
        }

        .nav-list {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 3rem;
            flex-wrap: wrap;
        }

        .nav-item button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: background-color 0.3s, transform 0.2s;
        }

        .nav-item button:hover, .nav-item button.active {
            background-color: #0E42D2;
            transform: translateY(-2px);
        }

        .page-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: none;
            background-color: transparent;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            text-align: center;
            min-height: calc(100vh - 80px);
        }

        .page-container.active {
            display: block;
        }

        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .resource-card {
            background-color: transparent;
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s;
        }

        .resource-card:hover {
            transform: translateY(-5px);
        }

        .resource-img {
            width: 120px;
            height: 120px;
            border-radius: 4px;
            margin-bottom: 1rem;
            object-fit: cover;
            border: 1px solid #eee;
        }

        .action-btn {
            padding: 0.8rem 2rem;
            background-color: #165DFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .action-btn:hover {
            background-color: #0E42D2;
        }

        .contact {
            text-align: center;
            margin: 3rem 0 1rem 0;
        }

        .notice {
            text-align: center;
            color: red;
            margin-bottom: 2rem;
        }

        .page-container h1 {
            color: #165DFF;
            margin-bottom: 2rem;
        }

        /* 弹窗样式 */
        #downloadModal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        #downloadModal .modal-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
            margin: 15% auto;
            text-align: center;
        }
    </style>
</head>

<!-- 弹窗 -->
<div id="downloadModal">
    <div class="modal-box">
        <p>确认下载该资源？</p>
        <br>
        <button onclick="doDownload()">确定</button>
        <button onclick="closeModal()">取消</button>
    </div>
</div>

<script>
let downloadLink = "";

function confirmDownload(link){
    downloadLink = link;
    document.getElementById("downloadModal").style.display = "block";
}

function doDownload(){
    window.location.href = downloadLink;
}

function closeModal(){
    document.getElementById("downloadModal").style.display = "none";
}

/* 原导航逻辑 */
const navBtns = document.querySelectorAll('.nav-btn');
const pageContainers = document.querySelectorAll('.page-container');

navBtns.forEach(btn => {
    btn.addEventListener('click', () => {
        navBtns.forEach(b => b.classList.remove('active'));
        pageContainers.forEach(page => page.classList.remove('active'));

        btn.classList.add('active');
        const targetPage = document.getElementById(btn.dataset.page + "-page");
        if (targetPage) {
            targetPage.classList.add('active');
        }

        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
});
</script>
